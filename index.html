<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Your Success Team Fast</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top, #0a0f1c 0%, #050816 100%);
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    h1 span {
      color: #00d67a;
      text-shadow: 0 0 15px rgba(0, 214, 122, 0.6);
    }

    .attention {
      color: #f5c76a;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .subheadline {
      font-size: 1.2rem;
      color: #c9d4f5;
      margin-bottom: 25px;
    }

    .video-space {
      width: 100%;
      height: 300px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px dashed rgba(0, 214, 122, 0.4);
      border-radius: 12px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00d67a;
      font-weight: 500;
      font-size: 1rem;
      text-transform: uppercase;
    }

    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    input[type="email"] {
      width: 80%;
      max-width: 400px;
      padding: 14px 16px;
      border-radius: 999px;
      border: none;
      font-size: 1rem;
      color: #111;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    input::placeholder {
      color: #777;
    }

    button {
      background: linear-gradient(135deg, #00d67a, #00b86a);
      color: #02130a;
      font-weight: 700;
      text-transform: uppercase;
      padding: 14px 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(0, 214, 122, 0.8);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(0, 214, 122, 1);
    }

    .microcopy {
      font-size: 0.85rem;
      color: #c9d4f5;
      margin-top: 10px;
    }

    .highlight {
      color: #f5c76a;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .video-space {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="attention">⚡ Oportunidad Limitada · Primeros en llegar</div>
    <h1>Build Your <span>Success Team</span> Fast</h1>
    <p class="subheadline">Descubre cómo construir tu equipo sin pagar nada al inicio — solo para quienes actúan rápido.</p>

    <div class="video-space">Espacio para video de presentación</div>

    <form class="form">
      <input type="email" placeholder="tu-mejor-correo@ejemplo.com" required />
      <button>Reserve Your Position Today</button>
      <p class="microcopy">Sin spam. Solo información que despierta curiosidad y resultados reales.</p>
    </form>
  </div>
</body>
</html>
